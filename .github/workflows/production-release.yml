name: Production Release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  production-release:
    name: Build and push to Harbor
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive

      - name: Checkout official assets
        run: |
          git config submodule.packages/client/assets.url https://github.com/stoatchat/assets
          git submodule update --init packages/client/assets

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to Harbor
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: https://registry.stoatinternal.com
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          push: true
          tags: |
            registry.stoatinternal.com/stoat/frontend:${{ github.sha }}
            registry.stoatinternal.com/stoat/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
